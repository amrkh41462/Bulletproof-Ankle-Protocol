const EDUCATION = [
  { title: "ليه إصابات الكاحل بتتكرر؟", body: "بعد الـ (Lateral Ankle Sprain)، الـ (Mechanoreceptors) — اللي هي المستشعرات الدقيقة جوه المفصل المسؤولة عن تحديد الوضع والحركة — بتتعرض للتلف. حتى بعد ما الألم والتورم يختفوا، المستشعرات دي بتفضل مش شغالة بكفاءة. ده معناه إن الكاحل مبيقدرش يبعت معلومات دقيقة للمخ بسرعة كافية عشان يمنع الإصابة الجاية. وده السبب إن نسبة تكرار الإصابة بتتخطى الـ ٧٠٪ عند الرياضيين اللي بيرجعوا للرياضة من غير تأهيل مظبوط." },
  { title: "دور الـ (Dorsiflexion) أو ثني الكاحل لأعلى", body: "الـ (Dorsiflexion) هو قدرتك إنك تتني كاحلك بحيث صوابعك تقرب من الساق. بعد التواء الكاحل، المفصل بيبقى متيبس وبيفقد الحركة دي. ولما الـ (Dorsiflexion) بيقل، جسمك بيعوض ده بإن كعبك بيترفع بدري أثناء المشي أو الجري. ده بيجبر الركبة والحوض إنهم يدخلوا لجوه، وبيحط ضغط غير طبيعي على الجزء الخارجي من الكاحل، وبيخلي احتمالية الالتواء أعلى بكتير أثناء الهبوط والـ (Cutting). كل مرحلة في البروتوكول ده بتشتغل عشان تستعيد الحركة دي." },
  { title: "ليه تمارين التوازن لوحدها مش كفاية؟", body: "الوقوف على رجل واحدة بيمرن التحكم الوضعي البطيء. في الرياضة، الكاحل بيواجه قوى بتحصل في أجزاء من الثانية — أسرع بكتير من اللي تمارين التوازن لوحدها ممكن تحضرك ليه. عشان كده البروتوكول بيتدرج من الثبات الساكن (Phase 2) للتحكم في الهبوط برد فعل سريع (Phase 3)، وصولاً للفوضى الرياضية غير المتوقعة (Phase 4). كل مرحلة بتتحدى الجهاز العصبي بسرعة ومستوى تعقيد أعلى." },
  { title: "تكيف الأوتار — ليه الـ (Tempo) البطيء مهم؟", body: "أوتار الـ (Peroneal) على الجزء الخارجي من الكاحل ووتر أكيلس في الخلف بيعتبروا (Stabilizers) في منتهى الأهمية. الأوتار بتتكيف مع التمرين أبطأ بكتير من العضلات — محتاجين ضغط (Eccentric Loading) بشكل مستمر وتدريجي عشان يبقوا أقوى وأكثر صلابة. وده السبب إن المرحلة التالتة بتستخدم (Tempo) بطيء لمدة ٤ ثواني في النزول. الاستعجال في العملية دي بينتج عنه أوتار لسه ضعيفة." },
  { title: "العودة للرياضة — أساطير بيصدقها الرياضيين", body: "الخرافة الأولى: 'مبقاش في ألم يبقى أنا جاهز'. الألم هو آخر حاجة بترجع بعد الإصابة وأول حاجة بتختفي — مبيقولكش حاجة عن البنية (Structure). الخرافة التانية: 'أنا حاسس بثقة'. الثقة النفسية والجاهزية الميكانيكية حاجتين مختلفتين. الخرافة التالتة: 'عدى ٦ أسابيع'. الوقت بيعالج الأنسجة مابيعملش إعادة تدريب للجهاز العصبي. البروتوكول ده بيديك التصريح بناءً على اللي كاحلك يقدر يعمله فعلياً." },
  { title: "التعامل مع التورم — ليه هو مهم لوظيفة العضلات؟", body: "حتى التورم البسيط جوه المفصل بيقلل مباشرة من قدرة العضلات المحيطة إنها تشتغل (Arthrogenic Muscle Inhibition). ده معناه إن الكاحل المورم حرفياً مبيقدرش يقبض العضلات المثبتة بكامل قوتها، بغض النظر عن محاولاتك. التعامل مع التورم مش بس عشان الراحة — ده عشان نضمن إن العضلات قادرة فعلاً تستجيب للتدريب." },
  { title: "الأحذية الرياضية أثناء فترة التأهيل", body: "استخدم جزمة رياضية الـ (Heel Drop) بتاعها أقل من ٨ مم. الجزم اللي كعبها عالي بتقلل المعلومات الحسية اللي بتوصل من باطن القدم — ودي المعلومات اللي جهازك العصبي محتاجها عشان يعيد تدريب ثبات الكاحل. الجزم المسطحة (Flat) بتحسن جداً من جودة إعادة تدريب الـ (Proprioception)." },
];

              {/* Locked phase view */}
              {activePhase > currentPhase && (
                <div style={{ padding: "12px 16px", background: "#111315", border: "1px solid #1E2126", marginBottom: 14 }}>
                  <div style={{ fontSize: 13, color: "#4B5058" }}>🔒 هذه المرحلة مقفولة — أكمل المراحل السابقة أولاً لفتحها</div>
                </div>
              )}

              {/* Advancement button — only shown on current active phase */}
              {activePhase === currentPhase && currentPhase < PHASES.length - 1 && (
                <button
                  onClick={() => meetsWeekThreshold && handlePhaseAdvancement()}
                  style={{
                    display: "block", width: "100%", padding: "14px 20px",
                    background: meetsWeekThreshold ? "#0A1E0A" : "#111315",
                    border: `1px solid ${meetsWeekThreshold ? PHASES[currentPhase + 1].color : "#2A2D32"}`,
                    color: meetsWeekThreshold ? PHASES[currentPhase + 1].color : "#3A3D42",
                    fontFamily: "'Tajawal', sans-serif", fontSize: 13, fontWeight: 600,
                    cursor: meetsWeekThreshold ? "pointer" : "not-allowed",
                    textAlign: "right", transition: "all 0.2s", lineHeight: 1.6,
                  }}>
                  {meetsWeekThreshold
                    ? `✓ تأكيد تقدم المرحلة — الانتقال إلى ${PHASES[currentPhase + 1].name}: ${PHASES[currentPhase + 1].shortLabel} ←`
                    : `تقدم المرحلة غير متاح — استيفاء ${arNum(activePhaseMinWeeks)} أسابيع شرط لتفعيل هذا الخيار`
                  }
                </button>
              )}

              {/* Protocol complete */}
              {activePhase === currentPhase && currentPhase === PHASES.length - 1 && (
                <div className="info-box" style={{ margin: 0 }}>
                  <div style={{ fontSize: 13, color: "#5BAD6F", lineHeight: 1.7 }}>
                    ✓ اكتملت جميع مراحل البروتوكول الأربعة. الخطوة التالية هي اجتياز مجموعة اختبارات العودة للرياضة (RTS Battery) — راجع مركز التقييمات.
                  </div>
                </div>
              )}
            </div>

            {/* Session tabs */}
            <div style={{ display: "flex", gap: 1, marginBottom: 16, background: "#1A1D21" }}>
              {phase.sessions.map((s, i) => (
                <button key={i} className={`phase-tab ${activeSession === i ? "active" : ""}`}
                  style={{ color: activeSession === i ? "#E8E6E1" : undefined }}
                  onClick={() => setActiveSession(i)}>
                  {s.label.split("—")[0].trim()}
                </button>
              ))}
            </div>

            <div className="card">
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontFamily: "'Cairo', sans-serif", fontSize: 18, fontWeight: 600, color: "#E8E6E1" }}>{phase.sessions[activeSession].label}</div>
                <div style={{ fontSize: 12, color: "#4B5058", marginTop: 4 }}>{phase.sessions[activeSession].day}</div>
              </div>

              {/* Tempo legend */}
              <div className="tempo-legend">
                <div style={{ fontSize: 12, color: "#4B5058", alignSelf: "center" }}>دليل الـ (Tempo):</div>
                {[["3-1-2","نزول ٣ث · ثبات ١ث · صعود ٢ث"],["4-1-1","نزول ٤ث · ثبات ١ث · صعود ١ث"],["X","انفجاري (Explosive)"]].map(([code, meaning]) => (
                  <div key={code} className="tempo-legend-item"><span>{code}</span>{meaning}</div>
                ))}
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 1, background: "#1A1D21" }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 50px 70px 70px 70px", gap: 8, padding: "8px 14px", background: "#0D0F11" }} className="session-table">
                  {["التمرين","مجموعات","تكرارات","Tempo","راحة"].map((h, hi) => (
                    <div key={h} style={{ fontSize: 11, color: "#3A3D42" }} className={hi >= 3 ? "hide-mobile" : ""}>{h}</div>
                  ))}
                </div>
                {phase.sessions[activeSession].exercises.map((ex, i) => (
                  <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 50px 70px 70px 70px", gap: 8, padding: "13px 14px", background: "#0C0E10", alignItems: "center" }} className="session-table">
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ fontSize: 14, fontWeight: 500, color: "#E8E6E1" }}>{ex.name}</div>
                      <a href={ex.videoUrl} target="_blank" rel="noreferrer" style={{ fontSize: 11, color: "#4A9EBF", textDecoration: "none", border: "1px solid #1A3A4A", padding: "2px 7px", flexShrink: 0 }}>▶</a>
                    </div>
                    <div style={{ fontSize: 14, color: "#B8B4AF", fontFamily: "'Cairo', sans-serif" }}>{ex.sets}</div>
                    <div style={{ fontSize: 14, color: "#B8B4AF", fontFamily: "'Cairo', sans-serif" }}>{ex.reps}</div>
                    <div style={{ fontSize: 12, color: "#6B7280" }} className="hide-mobile">{ex.tempo}</div>
                    <div style={{ fontSize: 12, color: "#6B7280" }} className="hide-mobile">{ex.rest}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── EXERCISE LIBRARY ───────────────────────────────────────────── */}
        {activeNav === "Exercise Library" && (
          <div>
            <div style={{ marginBottom: 32 }}>
              <div style={{ fontFamily: "'Cairo', sans-serif", fontSize: 14, fontWeight: 600, color: "#E8663D", marginBottom: 8 }}>قاعدة بيانات التكنيك</div>
              <h1 style={{ fontFamily: "'Cairo', sans-serif", fontSize: 42, fontWeight: 800, color: "#E8E6E1", lineHeight: 1 }}>مكتبة التمارين</h1>
            </div>
            <div className="info-box" style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 13, color: "#5BAD6F" }}>كل تمرين مربوط بفيديو خاص. اضغط على ▶ اتفرج على شرح الفيديو على أي تمرين عشان تشوف التكنيك الصح.</div>
            </div>
            <div style={{ background: "#1A1D21" }}>
              {allExercises.map((ex, i) => {
                const isOpen = expandedExercise === i;
                return (
                  <div key={i} className="edu-item" style={{ background: "#0C0E10" }}>
                    <div className="edu-header" onClick={() => setExpandedExercise(isOpen ? null : i)}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                        <span style={{ fontFamily: "'Cairo', sans-serif", fontSize: 18, fontWeight: 600, color: "#E8E6E1" }} className="edu-title">{ex.name}</span>
                        <span className="tag" style={{ background: `${ex.phaseColor}18`, color: ex.phaseColor, border: `1px solid ${ex.phaseColor}40` }}>{ex.phase}</span>
                      </div>
                      <div style={{ fontSize: 18, color: "#4B5058", transform: isOpen ? "rotate(45deg)" : "none", transition: "transform 0.2s", flexShrink: 0 }}>+</div>
                    </div>
                    {isOpen && (
                      <div style={{ padding: "0 24px 24px", borderTop: "1px solid #1A1D21" }}>
                        <div style={{ marginTop: 16, marginBottom: 16 }}>
                          <a href={ex.videoUrl} target="_blank" rel="noreferrer"
                            style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "10px 18px", background: "#0D2B45", border: "1px solid #1A3A5A", color: "#4A9EBF", fontSize: 13, textDecoration: "none" }}>
                            ▶ اتفرج على شرح الفيديو
                          </a>
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }} className="two-col">
                          <div>
                            <div style={{ fontSize: 11, color: "#4B5058", marginBottom: 8 }}>الوصفة التدريبية (Prescription)</div>
                            <div style={{ padding: "12px 14px", background: "#111315", border: "1px solid #1E2126", fontSize: 13, color: "#B8B4AF", lineHeight: 1.8 }}>
                              <div>المجموعات: {ex.sets}</div>
                              <div>التكرارات: {ex.reps}</div>
                              <div>الـ (Tempo): {ex.tempo}</div>
                              <div>الراحة: {ex.rest}</div>
                            </div>
                          </div>
                          <div>
                            <div style={{ fontSize: 11, color: "#4B5058", marginBottom: 8 }}>أنهي رجل؟</div>
                            <div style={{ padding: "12px 14px", background: "#111315", border: "1px solid #1E2126", fontSize: 13, color: "#B8B4AF", lineHeight: 1.8 }}>
                              <div>مرّن الرجلين إلا لو مكتوب غير كده.</div>
                              <div style={{ marginTop: 4, color: "#6B7280" }}>دايماً ابدأ بالرجل المصابة الأول وانت طاقتك لسه عالية.</div>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── PROGRESS ───────────────────────────────────────────────────── */}
        {activeNav === "Progress" && (
          <div>
            <div style={{ marginBottom: 32 }}>
              <div style={{ fontFamily: "'Cairo', sans-serif", fontSize: 14, fontWeight: 600, color: "#E8663D", marginBottom: 8 }}>القياسات والتطور</div>
              <h1 style={{ fontFamily: "'Cairo', sans-serif", fontSize: 42, fontWeight: 800, color: "#E8E6E1", lineHeight: 1 }}>متابعة التطور</h1>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 20 }} className="two-col">
              {[
                { label: "تماثل القفز (Hop Symmetry)", value: 82, target: 90, unit: "٪", color: "#4A9EBF" },
                { label: "مجموع الـ (Y-Balance)", value: 86, target: 90, unit: "٪", color: "#D4A843" },
                { label: "تكرارات (Calf Raise) رجل واحدة", value: 18, target: 25, unit: " عدة", color: "#E8663D" },
                { label: "عدم تماثل الـ (Dorsiflexion)", value: 2.8, target: 3, unit: " سم", color: "#5BAD6F", invert: true },
                { label: "الألم (٠-١٠)", value: 3, target: 2, unit: "/١٠", color: "#E8663D", invert: true },
                { label: "الالتزام بالبرنامج", value: 75, target: 100, unit: "٪", color: "#5BAD6F" },
              ].map((m, i) => {
                const pct = m.invert ? Math.max(0, Math.min(100, (1 - m.value/(m.target*1.5))*100+50)) : Math.min(100,(m.value/m.target)*100);
                const met = m.invert ? m.value <= m.target : m.value >= m.target;
                return (
                  <div key={i} className="card">
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12, flexWrap: "wrap", gap: 6 }}>
                      <div style={{ fontSize: 12, color: "#6B7280" }}>{m.label}</div>
                      <span className="tag" style={{ background: met ? "#1C2E1C" : "#1E1410", color: met ? "#5BAD6F" : "#E8663D", border: `1px solid ${met ? "#5BAD6F" : "#E8663D"}` }}>{met ? "في التارجت" : "عجز (DEFICIT)"}</span>
                    </div>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 12 }}>
                      <div style={{ fontFamily: "'Cairo', sans-serif", fontSize: 34, fontWeight: 700, color: m.color, lineHeight: 1 }}>{m.value}</div>
                      <div style={{ fontSize: 12, color: "#6B7280" }}>{m.unit} <span style={{ color: "#3A3D42" }}>/ {m.target}{m.unit}</span></div>
                    </div>
                    <div style={{ height: 4, background: "#1A1D21", borderRadius: 2 }}>
                      <div style={{ height: "100%", width: `${Math.min(100,pct)}%`, background: m.color, borderRadius: 2 }} />
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="card">
              <div style={{ fontSize: 12, color: "#4B5058", marginBottom: 16 }}>نظرة عامة على جاهزية المراحل</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 1, background: "#1A1D21" }}>
                {PHASES.map((p, i) => {
                  const statusLabel = i < currentPhase ? "مكتمل" : i === currentPhase ? "قيد التنفيذ" : "مقفول";
                  const sc = { "مكتمل": "#5BAD6F", "قيد التنفيذ": "#D4A843", "مقفول": "#3A3D42" };
                  return (
                    <div key={i} style={{ background: "#0C0E10", padding: "13px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 6, height: 6, background: p.color, borderRadius: "50%", flexShrink: 0 }} />
                        <div style={{ fontSize: 14, fontWeight: 500, color: i <= currentPhase ? "#E8E6E1" : "#4B5058" }}>{p.name}: {p.shortLabel}</div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ fontSize: 12, color: "#4B5058" }}>{arNum(weeksPerPhase[i])}/{arNum(p.minWeeks)} أسابيع</div>
                        <span className="tag" style={{ color: sc[statusLabel], border: `1px solid ${sc[statusLabel]}`, background: "transparent" }}>{statusLabel}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ── EDUCATION ──────────────────────────────────────────────────── */}
        {activeNav === "Education" && (
          <div>
            <div style={{ marginBottom: 32 }}>
              <div style={{ fontFamily: "'Cairo', sans-serif", fontSize: 14, fontWeight: 600, color: "#E8663D", marginBottom: 8 }}>علم الإصابات والاستشفاء</div>
              <h1 style={{ fontFamily: "'Cairo', sans-serif", fontSize: 42, fontWeight: 800, color: "#E8E6E1", lineHeight: 1 }}>التثقيف الطبي</h1>
            </div>
            <div style={{ background: "#1A1D21", marginBottom: 24 }}>
              {EDUCATION.map((e, i) => {
                const isOpen = expandedEdu === i;
                return (
                  <div key={i} className="edu-item" style={{ background: "#0C0E10" }}>
                    <div className="edu-header" onClick={() => setExpandedEdu(isOpen ? null : i)}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 4, height: 4, background: "#E8663D", flexShrink: 0 }} />
                        <span style={{ fontFamily: "'Cairo', sans-serif", fontSize: 18, fontWeight: 600 }} className="edu-title">{e.title}</span>
                      </div>
                      <div style={{ fontSize: 18, color: "#4B5058", transform: isOpen ? "rotate(45deg)" : "none", transition: "transform 0.2s", flexShrink: 0 }}>+</div>
                    </div>
                    {isOpen && (
                      <div style={{ padding: "0 24px 24px", borderTop: "1px solid #1A1D21" }}>
                        <div style={{ fontSize: 14, color: "#8B8780", lineHeight: 1.9, maxWidth: 620, marginTop: 14 }}>{e.body}</div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div style={{ padding: "20px 22px", background: "#111315", border: "1px solid #1E2126" }}>
              <div style={{ fontSize: 12, color: "#E8663D", marginBottom: 14 }}>معايير التأهيل غير القابلة للتفاوض</div>
              {["التدرج مبني على المعايير (Criteria-driven) — مش على الوقت.","اختفاء الألم لوحده مش معناه إنك جاهز.","إحساسك بالثقة الشخصية لوحده مش معناه الجاهزية.","تماثل القوة (Force Symmetry) لازم يتقاس، مش نخمنه.","جودة التحكم الديناميكي (Dynamic Control) مطلوبة قبل الخروج من أي مرحلة."].map((rule, i) => (
                <div key={i} style={{ fontSize: 13, color: "#B8B4AF", display: "flex", gap: 10, marginBottom: 8, lineHeight: 1.6 }}>
                  <span style={{ color: "#E8663D", flexShrink: 0 }}>—</span>{rule}
                </div>
              ))}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
